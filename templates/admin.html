<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precious Metals Admin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23FFD700' stroke='%23B8860B' stroke-width='4'/></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark border-bottom border-secondary mb-3">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"><i class="bi bi-gem me-2"></i>Precious Metals Signage</span>
        <span class="navbar-text text-muted" id="nav-version"></span>
    </div>
</nav>

<div class="container-fluid px-3">

    <!-- ============================================================ -->
    <!-- Card 1 — Now Playing (full width) -->
    <!-- ============================================================ -->
    <div class="card mb-3">
        <div class="card-header"><i class="bi bi-display me-2"></i>Now Playing</div>
        <div class="card-body d-flex align-items-center justify-content-between flex-wrap gap-2">
            <div>
                <span id="now-playing-label" class="fs-5 text-white">Stopped</span>
                <span id="now-playing-state" class="badge bg-secondary ms-2">stopped</span>
            </div>
            <div class="btn-group">
                <button class="btn btn-success" id="btn-play" title="Play"><i class="bi bi-play-fill"></i></button>
                <button class="btn btn-warning" id="btn-pause" title="Pause"><i class="bi bi-pause-fill"></i></button>
                <button class="btn btn-info"    id="btn-skip"  title="Skip"><i class="bi bi-skip-forward-fill"></i></button>
                <button class="btn btn-danger"  id="btn-stop"  title="Stop"><i class="bi bi-stop-fill"></i></button>
            </div>
        </div>
    </div>

    <div class="row g-3">

        <!-- ============================================================ -->
        <!-- Card 2 — Playlist (left column) -->
        <!-- ============================================================ -->
        <div class="col-lg-7">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-music-note-list me-2"></i>Playlist <span class="badge bg-secondary ms-1" id="playlist-count">0 videos</span></span>
                </div>
                <div class="card-body">
                    <ul class="list-group mb-3" id="playlist-list">
                        <!-- populated by JS -->
                    </ul>
                    <div class="d-flex gap-2">
                        <select class="form-select" id="video-select">
                            <option value="">Select a video to add...</option>
                        </select>
                        <button class="btn btn-primary flex-shrink-0" id="btn-add-video">
                            <i class="bi bi-plus-lg"></i> Add
                        </button>
                        <button class="btn btn-outline-primary flex-shrink-0" id="btn-add-all-videos">
                            <i class="bi bi-plus-circle"></i> Add All
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============================================================ -->
        <!-- Card 3 — Current Prices (right column) -->
        <!-- ============================================================ -->
        <div class="col-lg-5">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-graph-up me-2"></i>Current Prices (CAD)<span id="price-warn-badge" class="badge bg-warning text-dark ms-2 d-none">API Error</span></span>
                    <button class="btn btn-sm btn-outline-light" id="btn-refresh-prices">
                        <i class="bi bi-arrow-clockwise"></i> Refresh
                    </button>
                </div>
                <div class="card-body">
                    <table class="table table-dark table-sm mb-2" id="prices-table">
                        <thead>
                            <tr><th>Metal</th><th class="text-end">Price</th><th class="text-end">Change</th><th class="text-end">%</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                    <small class="text-muted" id="prices-updated"></small>
                </div>
            </div>
        </div>

    </div><!-- /row -->

    <!-- ============================================================ -->
    <!-- Card 4 — Settings -->
    <!-- ============================================================ -->
    <div class="card mt-3">
        <div class="card-header"><i class="bi bi-gear me-2"></i>Settings</div>
        <div class="card-body">
            <div class="row g-4">
                <!-- Ticker settings -->
                <div class="col-md-4">
                    <h6 class="text-muted mb-3">Ticker</h6>
                    <div class="form-check form-switch mb-2">
                        <input class="form-check-input" type="checkbox" id="set-ticker-enabled" checked>
                        <label class="form-check-label" for="set-ticker-enabled">Ticker enabled</label>
                    </div>
                    <div class="mb-2">
                        <label class="form-label">Mode</label>
                        <div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="tickerMode" id="mode-static" value="static" checked>
                                <label class="form-check-label" for="mode-static">Static</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="tickerMode" id="mode-marquee" value="marquee">
                                <label class="form-check-label" for="mode-marquee">Marquee</label>
                            </div>
                        </div>
                    </div>
                    <div class="mb-2">
                        <label class="form-label" for="set-currency">Display currency</label>
                        <select class="form-select form-select-sm" id="set-currency">
                            <option value="CAD">CAD</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                        </select>
                    </div>
                    <div class="mb-0">
                        <label class="form-label" for="set-update-interval">
                            Price update interval: <strong id="interval-val">1</strong> min
                        </label>
                        <input type="range" class="form-range" id="set-update-interval" min="1" max="60" value="1">
                    </div>
                </div>

                <!-- Chart settings -->
                <div class="col-md-4">
                    <h6 class="text-muted mb-3">Chart Slides</h6>
                    <table class="table table-sm table-dark table-borderless chart-metals-table mb-3" id="chart-metals-table">
                        <thead>
                            <tr><th></th><th class="text-center">1W</th><th class="text-center">1M</th><th class="text-center">1Y</th><th class="text-center">10Y</th></tr>
                        </thead>
                        <tbody>
                            <tr data-symbol="GC=F">
                                <td><div class="form-check form-switch mb-0"><input class="form-check-input chart-metal-toggle" type="checkbox" id="cmt-gold" checked><label class="form-check-label" for="cmt-gold">Gold</label></div></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="5d" checked></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="1mo"></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="1y"></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="10y"></td>
                            </tr>
                            <tr data-symbol="SI=F">
                                <td><div class="form-check form-switch mb-0"><input class="form-check-input chart-metal-toggle" type="checkbox" id="cmt-silver" checked><label class="form-check-label" for="cmt-silver">Silver</label></div></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="5d" checked></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="1mo"></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="1y"></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="10y"></td>
                            </tr>
                            <tr data-symbol="PL=F">
                                <td><div class="form-check form-switch mb-0"><input class="form-check-input chart-metal-toggle" type="checkbox" id="cmt-plat" checked><label class="form-check-label" for="cmt-plat">Platinum</label></div></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="5d" checked></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="1mo"></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="1y"></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="10y"></td>
                            </tr>
                            <tr data-symbol="PA=F">
                                <td><div class="form-check form-switch mb-0"><input class="form-check-input chart-metal-toggle" type="checkbox" id="cmt-pall" checked><label class="form-check-label" for="cmt-pall">Palladium</label></div></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="5d" checked></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="1mo"></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="1y"></td>
                                <td class="text-center"><input class="form-check-input chart-period" type="checkbox" data-period="10y"></td>
                            </tr>
                        </tbody>
                    </table>
                    <div class="mb-2">
                        <label class="form-label" for="set-chart-frequency">
                            Show chart every <strong id="freq-val">3</strong> videos
                        </label>
                        <input type="range" class="form-range" id="set-chart-frequency" min="1" max="10" value="3">
                    </div>
                    <div class="mb-0">
                        <label class="form-label" for="set-chart-duration">
                            Chart duration: <strong id="dur-val">15</strong>s
                        </label>
                        <input type="range" class="form-range" id="set-chart-duration" min="5" max="60" value="15">
                    </div>
                </div>

                <!-- Display settings -->
                <div class="col-md-4">
                    <h6 class="text-muted mb-3">Display</h6>
                    <div class="mb-3">
                        <label class="form-label" for="set-display-monitor">Launch display on</label>
                        <div class="d-flex gap-2">
                            <select class="form-select" id="set-display-monitor">
                                <option value="0">Detecting monitors...</option>
                            </select>
                            <button class="btn btn-outline-secondary flex-shrink-0" id="btn-identify-monitors" title="Flash monitor numbers on screen">
                                <i class="bi bi-tv"></i> Identify
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="set-image-duration">
                            Image display: <strong id="imgdur-val">10</strong>s
                        </label>
                        <input type="range" class="form-range" id="set-image-duration" min="5" max="60" value="10">
                    </div>
                    <button class="btn btn-outline-light w-100 mb-2" id="btn-launch-display">
                        <i class="bi bi-box-arrow-up-right me-1"></i>Launch Display
                    </button>
                    <button class="btn btn-primary w-100" id="btn-save-settings">
                        <i class="bi bi-check-lg me-1"></i>Save Settings
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- Card 5 — System -->
    <!-- ============================================================ -->
    <div class="card mt-3 mb-4">
        <div class="card-header"><i class="bi bi-terminal me-2"></i>System</div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="mb-2"><strong>Version:</strong> <span id="sys-version">—</span> <span class="text-muted">by <a href="https://github.com/saschca/precious-metals-signage" class="text-muted" target="_blank">saschca</a></span></div>
                    <div class="mb-2"><strong>Uptime:</strong> <span id="sys-uptime">—</span></div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="set-auto-start">
                        <label class="form-check-label" for="set-auto-start">Auto-start on boot</label>
                    </div>
                </div>
                <div class="col-md-8">
                    <label class="form-label text-muted">Recent log entries</label>
                    <pre class="bg-black text-success p-2 rounded log-box" id="log-box"></pre>
                </div>
            </div>
        </div>
    </div>

</div><!-- /container -->

<!-- Toast container -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<script src="/static/js/admin.js"></script>
</body>
</html>
